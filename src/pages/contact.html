<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - LUMINA | 简约设计，点亮美好生活</title>
  <meta name="description" content="联系 LUMINA 团队，我们随时准备为您提供专业的照明与生活解决方案咨询服务。">
  <meta name="keywords" content="联系我们,LUMINA客服,咨询服务,技术支持">
  <link rel="canonical" href="https://lumina.com/contact">
  <style>
    @import '../styles/main.css';
  </style>
</head>
<body class="bg-slate-50 text-slate-950">
  <!--header-->

  <main class="min-h-screen py-24 px-6">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-4xl font-bold mb-8 text-center">联系我们</h1>
      <p class="text-lg text-slate-600 mb-12 text-center">有任何问题或需求，请随时联系我们</p>

      <div class="grid gap-6 md:grid-cols-2">
        <div class="bg-white p-6 rounded-lg border border-slate-200">
          <h3 class="text-xl font-semibold mb-4">联系方式</h3>
          <div class="space-y-3">
            <p><strong>邮箱：</strong>hello@lumina.com</p>
            <p><strong>电话：</strong>400-888-8888</p>
            <p><strong>地址：</strong>北京市朝阳区建国路88号</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-lg border border-slate-200">
          <h3 class="text-xl font-semibold mb-4">工作时间</h3>
          <div class="space-y-2">
            <p>周一至周五：9:00 - 18:00</p>
            <p>周六、周日：10:00 - 16:00</p>
            <p>节假日：请通过邮箱联系</p>
          </div>
        </div>
      </div>

      <div class="mt-8 bg-white p-6 rounded-lg border border-slate-200">
        <h3 class="text-xl font-semibold mb-4">发送消息</h3>
        <form class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-2">姓名</label>
            <input type="text" class="w-full border border-slate-300 rounded-lg px-4 py-2" placeholder="您的姓名">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">邮箱</label>
            <input type="email" class="w-full border border-slate-300 rounded-lg px-4 py-2" placeholder="您的邮箱">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">消息</label>
            <textarea rows="4" class="w-full border border-slate-300 rounded-lg px-4 py-2" placeholder="请描述您的需求..."></textarea>
          </div>
          <button type="submit" class="bg-slate-950 text-white px-6 py-2 rounded-lg hover:bg-slate-800">发送消息</button>
        </form>
      </div>
    </div>
  </main>

  <!--footer-->
</body>
</html>
</body>
</html>
