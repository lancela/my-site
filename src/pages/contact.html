<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品页 - 我的独立站</title>
  <meta name="description" content="详细产品介绍...">
  <meta name="keywords" content="关键词1,关键词2">
  <link rel="canonical" href="https://example.com/product.html">
  <style>
    @import '../styles/main.css';
  </style>
  <!-- JSON-LD 结构化数据 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "产品名称",
    "description": "..."
  }
  </script>
</head>
<body>
  <!-- 相同 header/footer 仍可复用 -->
  <main class="min-h-screen py-24 px-6">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-5xl font-bold mb-8">Contact Us</h1>
      <form id="contactForm" class="bg-gray-900 rounded-2xl p-8 border border-white/10">
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Name</label>
          <input type="text" name="name" required class="w-full bg-black border border-white/20 rounded-lg px-4 py-2 text-white focus:border-orange-500 outline-none transition">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Email</label>
          <input type="email" name="email" required class="w-full bg-black border border-white/20 rounded-lg px-4 py-2 text-white focus:border-orange-500 outline-none transition">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Subject</label>
          <input type="text" name="subject" class="w-full bg-black border border-white/20 rounded-lg px-4 py-2 text-white focus:border-orange-500 outline-none transition">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Message</label>
          <textarea name="message" rows="6" required class="w-full bg-black border border-white/20 rounded-lg px-4 py-2 text-white focus:border-orange-500 outline-none transition"></textarea>
        </div>
        <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition">
          Send Message
        </button>
      </form>
    </div>
  </main>
</body>
</html>
